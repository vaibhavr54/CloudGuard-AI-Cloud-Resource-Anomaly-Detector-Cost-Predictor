version: "3.9"

services:
  cloudguard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloudguard-ai
    ports:
      - "8000:8000"
    volumes:
      # Persist models and data between container restarts
      - ./models:/app/models
      - ./data:/app/data
      - ./mlruns:/app/mlruns
    environment:
      - PORT=8000
      - ENABLE_SHAP=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s